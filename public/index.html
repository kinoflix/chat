<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KINOFLIX - Onlayn Çat</title>
  <style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #141414, #E50914); color: white; min-height: 100vh; display: flex; flex-direction: column; }
    
    /* Ekran idarəetməsi */
    .chat-screen { display: none !important; flex-direction: column; height: 100%; }
    .chat-screen.active { display: flex !important; }

    .social-chat-section { width: 100%; max-width: 800px; height: 600px; background: #efeae2; margin: 30px auto; border-radius: 15px; overflow: hidden; color: #333; display: flex; flex-direction: column; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    
    #loginScreen { background: linear-gradient(135deg, #141414, #222222); color: white; justify-content: center; align-items: center; padding: 20px; text-align: center; }
    #loginScreen h2 { color: #E50914; margin-bottom: 20px; font-size: 28px; letter-spacing: 1px; }
    .nick-input { width: 280px; padding: 12px; border-radius: 25px; border: 1px solid #444; margin-bottom: 12px; text-align: center; background: #333; color: white; outline: none; }
    .nick-input:focus { border-color: #E50914; }
    .login-btn { background: #E50914; color: white; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
    .login-btn:hover { background: #b80710; }
    .login-btn:disabled { background: #555; cursor: not-allowed; }
    
    .whatsapp-header { background: #181818; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #E50914; }
    .chat-messages-area { flex: 1; padding: 20px; overflow-y: auto; background: #111111; display: flex; flex-direction: column; gap: 10px; }
    
    .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 10px; font-size: 14px; word-wrap: break-word; color: white; }
    .me { background: #E50914; align-self: flex-end; border-bottom-right-radius: 2px; }
    .other { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
    
    .chat-input-bar { background: #181818; padding: 12px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
    .chat-input-bar input { flex: 1; padding: 12px; background: #262626; border: 1px solid #444; border-radius: 20px; color: white; outline: none; padding-left: 20px; }
    .chat-input-bar input:focus { border-color: #E50914; }
    .send-btn { padding: 10px 24px; background: #E50914; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .send-btn:hover { background: #b80710; }
    .error-text { color: #ff3333; font-size: 14px; margin-top: 10px; display: none; }
  </style>
</head>

<body>
  <main>
    <div class="social-chat-section">
      <div class="chat-screen active" id="loginScreen">
        <h2>KINOFLIX ÇAT</h2>
        <input type="text" id="nicknameInput" class="nick-input" placeholder="Ləqəbiniz">
        <input type="password" id="passwordInput" class="nick-input" placeholder="Şifrəniz">
        <button class="login-btn" id="loginBtn" onclick="loginOrRegister()">Daxil Ol</button>
        <div class="error-text" id="errorText"></div>
      </div>

      <div class="chat-screen" id="mainChatScreen">
        <div class="whatsapp-header">
          <div id="myDisplayNick" style="font-weight: bold; color: #E50914;">İstifadəçi</div>
          <button onclick="location.reload()" style="background:#d32f2f; color:white; border:none; border-radius:5px; padding:6px 12px; cursor:pointer; font-weight:bold;">Çıxış</button>
        </div>
        <div class="chat-messages-area" id="chatMessagesArea"></div>
        <div class="chat-input-bar">
          <input type="text" id="messageInputField" placeholder="Mesaj yazın..." autocomplete="off">
          <button class="send-btn" onclick="triggerMessageSend()">Göndər</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    window.currentUserNick = "";

    window.loginOrRegister = function() {
      const nick = document.getElementById('nicknameInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      const loginBtn = document.getElementById('loginBtn');
      const errorText = document.getElementById('errorText');

      if(!nick || !pass) {
        alert("Boşluq saxlamayın!");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerText = "Yoxlanılır...";
      errorText.style.display = "none";

      // Render mühiti üçün socket-i düzgün başladırıq
      socket = io({
        transports: ['websocket', 'polling']
      });

      // Server yuxudadırsa timeout sığortası
      const timeout = setTimeout(() => {
        errorText.innerText = "Server gec cavab verir. Yenidən cəhd edin.";
        errorText.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.innerText = "Daxil Ol";
        socket.disconnect();
      }, 8000);

      socket.on('connect', () => {
        clearTimeout(timeout);

        // Server.js-dəki mərkəzi login hadisəsinə müraciət
        socket.emit('login', { nick, pass }, (response) => {
          if (response.success) {
            window.currentUserNick = nick;
            document.getElementById('myDisplayNick').innerText = "İstifadəçi: " + nick;
            
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('mainChatScreen').classList.add('active');
            
            setupChatListeners(); // Listeners yalnız indi qoşulur
          } else {
            errorText.innerText = response.message;
            errorText.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.innerText = "Daxil Ol";
            socket.disconnect();
          }
        });
      });
    };

    function setupChatListeners() {
      // Köhnə mesajları bazadan çəkib ekrana doldurmaq
      socket.on('loadAllMessages', (messages) => {
        document.getElementById('chatMessagesArea').innerHTML = ''; 
        messages.forEach(msg => appendMessage(msg));
      });

      // Canlı gələn mesajları tutmaq
      socket.on('receiveMessage', (msg) => {
        appendMessage(msg);
      });
    }

    window.triggerMessageSend = () => {
      const input = document.getElementById('messageInputField');
      if(!input.value.trim() || !socket) return;
      
      // SERVER.JS-Ə TAM UYĞUN OBYEKT QURULUŞU (nick və message)
      socket.emit('sendMessage', { nick: window.currentUserNick, message: input.value.trim() });
      input.value = "";
    };

    // Enter klaviaturası dəstəyi
    document.getElementById('messageInputField').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') triggerMessageSend();
    });

    function appendMessage(msg) {
      // Köhnə və yeni verilənlər bazası formatlarını eyni anda dəstəkləmək üçün sığorta:
      const sender = msg.nick || msg.sender || "Anonim";
      const text = msg.message || msg.text || "";

      if (!text) return; // Boş mesajları render etmə

      const div = document.createElement('div');
      div.className = 'message-bubble ' + (sender === window.currentUserNick ? 'me' : 'other');
      div.innerHTML = `<b>${sender}:</b> ${escapeHTML(text)}`;
      
      const area = document.getElementById('chatMessagesArea');
      area.appendChild(div);
      area.scrollTop = area.scrollHeight; 
    }

    function escapeHTML(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
