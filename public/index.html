<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KINOFLIX - Onlayn Çat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      margin: 0; 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #141414, #222222); 
      color: white; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
    }
    
    .chat-screen { display: none !important; flex-direction: column; height: 100%; }
    .chat-screen.active { display: flex !important; }

    .social-chat-section { 
      width: 100%; 
      max-width: 800px; 
      height: 600px; 
      background: #111111; 
      margin: 30px auto; 
      border-radius: 15px; 
      overflow: hidden; 
      color: #333; 
      display: flex; 
      flex-direction: column; 
      position: relative; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      border: 1px solid #292929;
    }
    
    #loginScreen { 
      background: linear-gradient(135deg, #141414, #1c1c1c); 
      color: white; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
      text-align: center; 
    }
    #loginScreen h2 {
      color: #E50914;
      margin-bottom: 20px;
      font-size: 32px;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .nick-input { 
      width: 280px; 
      padding: 12px; 
      border-radius: 25px; 
      border: 1px solid #444; 
      margin-bottom: 12px; 
      text-align: center; 
      background: #262626;
      color: white;
      outline: none;
      font-size: 16px;
    }
    .nick-input:focus { border-color: #E50914; }
    
    .login-btn { 
      background: #E50914; 
      color: white; 
      border: none; 
      padding: 12px 50px; 
      border-radius: 25px; 
      cursor: pointer; 
      font-weight: bold;
      font-size: 16px;
      transition: background 0.3s;
    }
    .login-btn:hover { background: #b80710; }
    
    .whatsapp-header { 
      background: #181818; 
      color: white; 
      padding: 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 2px solid #E50914;
    }
    
    .chat-messages-area { 
      flex: 1; 
      padding: 20px; 
      overflow-y: auto; 
      background: #141414; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
    }
    .chat-messages-area::-webkit-scrollbar { width: 6px; }
    .chat-messages-area::-webkit-scrollbar-thumb { background: #E50914; border-radius: 10px; }

    .message-bubble { 
      max-width: 70%; 
      padding: 10px 14px; 
      border-radius: 12px; 
      font-size: 15px; 
      word-wrap: break-word;
      color: white;
      line-height: 1.4;
    }
    .message-bubble b { display: block; font-size: 0.85em; margin-bottom: 30px; opacity: 0.8; margin-bottom: 3px;}
    
    .me { background: #E50914; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
    .other { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; color: white; border: 1px solid #333; }
    
    .chat-input-bar { 
      background: #181818; 
      padding: 12px; 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      border-top: 1px solid #222;
    }
    .chat-input-bar input {
      flex: 1;
      padding: 12px 20px;
      background: #262626;
      border: 1px solid #444;
      border-radius: 25px;
      color: white;
      outline: none;
      font-size: 15px;
    }
    .chat-input-bar input:focus { border-color: #E50914; }
    
    .send-btn {
      padding: 11px 24px;
      background: #E50914;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .send-btn:hover { background: #b80710; }
  </style>
</head>

<body>
  <main>
    <div class="social-chat-section">
      
      <!-- GİRİŞ EKRANI -->
      <div class="chat-screen active" id="loginScreen">
        <h2>KINOFLIX ÇAT</h2>
        <input type="text" id="nicknameInput" class="nick-input" placeholder="Ləqəbiniz">
        <input type="password" id="passwordInput" class="nick-input" placeholder="Şifrəniz">
        <button class="login-btn" id="loginBtn" onclick="loginOrRegister()">Daxil Ol</button>
      </div>

      <!-- CANLI ÇAT EKRANI -->
      <div class="chat-screen" id="mainChatScreen">
        <div class="whatsapp-header">
          <div id="myDisplayNick" style="font-weight: bold; letter-spacing: 0.5px;">🔴 İstifadəçi</div>
          <button onclick="logoutChat()" style="background:#E50914; color:white; border:none; border-radius:20px; padding:6px 16px; cursor:pointer; font-weight:bold; transition: 0.3s;">Çıxış</button>
        </div>
        <div class="chat-messages-area" id="chatMessagesArea"></div>
        <div class="chat-input-bar">
          <input type="text" id="messageInputField" placeholder="Mesaj yazın..." autocomplete="off" onkeypress="handleKeyPress(event)">
          <button class="send-btn" onclick="triggerMessageSend()">Göndər</button>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    // === BAĞLANTI LİNKİ ===
    // Əgər index.html və server fərqli yerlərdədirsə, öz aktiv Render linkini bura yaz. Eynidirsə boş burax ""
    const RENDER_URL = "https://kinoflixchat.onrender.com"; 
    
    const socket = RENDER_URL 
      ? io(RENDER_URL, { transports: ['websocket', 'polling'] }) 
      : io({ transports: ['websocket', 'polling'] });

    window.currentUserNick = "";

    window.loginOrRegister = function() {
      const nick = document.getElementById('nicknameInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      const btn = document.getElementById('loginBtn');

      if(!nick || !pass) return alert("Lütfən ləqəb və şifrəni yazın.");
      if(!socket.connected) return alert("Serverə qoşulma gözlənilir, bir az sonra yenidən yoxlayın.");

      btn.disabled = true;
      btn.innerText = "Yoxlanılır...";

      socket.emit('login', { nick, pass }, (response) => {
        if (response.success) {
          window.currentUserNick = nick;
          document.getElementById('myDisplayNick').innerText = "🟢 " + nick;
          
          document.getElementById('loginScreen').classList.remove('active');
          document.getElementById('mainChatScreen').classList.add('active');
        } else {
          alert(response.message);
          btn.disabled = false;
          btn.innerText = "Daxil Ol";
        }
      });
    };

    window.triggerMessageSend = () => {
      const input = document.getElementById('messageInputField');
      if(!input.value.trim() || !window.currentUserNick) return;
      
      // Sənin nümunəndəki kimi dəqiq ötürmə formatı: sender və text
      socket.emit('sendMessage', { sender: window.currentUserNick, text: input.value.trim() });
      input.value = "";
    };

    window.handleKeyPress = (e) => {
      if (e.key === 'Enter') triggerMessageSend();
    };

    function appendMessage(msg) {
      const senderNick = msg.sender || msg.nick || "Anonim";
      const messageText = msg.text || msg.message || "";

      if (!messageText.trim()) return;

      const div = document.createElement('div');
      // Giriş etmiş istifadəçiyə görə dinamik sinif təyini (me: Qırmızı, other: Tünd Boz)
      div.className = 'message-bubble ' + (senderNick === window.currentUserNick ? 'me' : 'other');
      div.innerHTML = `<b>${senderNick}</b> ${escapeHTML(messageText)}`;
      
      const area = document.getElementById('chatMessagesArea');
      area.appendChild(div);
      area.scrollTop = area.scrollHeight; // Həmişə avtomatik ən aşağıya düşür
    }

    // Köhnə mesaj arxivi gələndə pəncərəni təmizləyib hamısını basır
    socket.on('loadAllMessages', (messages) => {
      document.getElementById('chatMessagesArea').innerHTML = ''; 
      messages.forEach(msg => appendMessage(msg));
    });

    // Yeni canlı mesaj gələndə anında ekrana əlavə edir
    socket.on('receiveMessage', (msg) => {
      appendMessage(msg);
    });

    // Tam sığortalı Çıxış (Logout) sistemi
    window.logoutChat = function() {
      socket.disconnect();
      location.reload();
    };

    function escapeHTML(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
