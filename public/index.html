<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINOFLIX - Canlı Çat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #141414; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: #181818; padding: 30px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; text-align: center; border-top: 4px solid #E50914; }
        .login-container h2 { margin-bottom: 20px; color: #E50914; font-size: 28px; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: #E50914; }
        .btn { width: 100%; padding: 12px; background: #E50914; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #b80710; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .error-msg { color: #ff3333; margin-top: 10px; font-size: 14px; display: none; }
        
        .chat-container { display: none; width: 100%; max-width: 800px; height: 85vh; background: #181818; border-radius: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); flex-direction: column; overflow: hidden; border: 1px solid #222; }
        .chat-header { background: #222; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .chat-header h3 { color: #E50914; }
        .user-info { font-size: 14px; color: #aaa; }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #111; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 8px; line-height: 1.4; font-size: 15px; word-wrap: break-word; }
        .msg.received { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.sent { background: #E50914; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg .meta { font-size: 11px; margin-bottom: 4px; font-weight: bold; color: #ff9999; }
        .msg.received .meta { color: #E50914; }
        .chat-input-area { padding: 15px; background: #181818; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; padding: 12px; background: #262626; border: 1px solid #444; border-radius: 4px; color: #fff; outline: none; }
        .chat-input-area input:focus { border-color: #E50914; }
        .chat-input-area button { width: 100px; }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <h2>KINOFLIX CHAT</h2>
        <div class="input-group">
            <label for="username">Ləqəb (Nick)</label>
            <input type="text" id="username" placeholder="Ləqəbinizi yazın...">
        </div>
        <div class="input-group">
            <label for="password">Şifrə</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <button class="btn" id="loginBtn">Daxil Ol / Qeydiyyat</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="chat-container" id="chatScreen">
        <div class="chat-header">
            <h3>KINOFLIX Canlı Çat</h3>
            <div class="user-info" id="activeUser">İstifadəçi: -</div>
        </div>
        <div class="messages-box" id="messagesBox"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." autocomplete="off">
            <button class="btn" id="sendBtn">Göndər</button>
        </div>
    </div>

    <script>
        // Bağlantını əvvəlcədən yox, yalnız lazım olanda başladırıq
        let socket; 

        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        
        const messagesBox = document.getElementById('messagesBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const activeUser = document.getElementById('activeUser');

        let myNick = "";

        loginBtn.addEventListener('click', () => {
            const nick = usernameInput.value.trim();
            const pass = passwordInput.value.trim();

            if (!nick || !pass) {
                showError("Lütfən bütün xanaları doldurun!");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "Yoxlanılır...";

            // Hər ehtimala qarşı köhnə bağlantı varsa təmizləyirik və Render mühitinə uyğun başladırıq
            socket = io({
                transports: ['websocket', 'polling'],
                autoConnect: true
            });

            // Bağlantı xətası ehtimalına qarşı timeout qoyuruq (Server oyaq deyilsə donub qalmasın)
            const connectionTimeout = setTimeout(() => {
                showError("Serverə qoşulmaq mümkün olmadı. Render oyanır ola bilər, az sonra yenidən yoxlayın.");
                loginBtn.disabled = false;
                loginBtn.innerText = "Daxil Ol / Qeydiyyat";
                socket.disconnect();
            }, 8000);

            socket.on('connect', () => {
                clearTimeout(connectionTimeout); // Qoşulma uğurludursa timeout-u ləğv et

                // İndi təhlükəsiz şəkildə login sorğusunu göndəririk
                socket.emit('login', { nick, pass }, (response) => {
                    if (response.success) {
                        myNick = nick;
                        activeUser.innerText = `İstifadəçi: ${myNick}`;
                        
                        loginScreen.style.display = 'none';
                        chatScreen.style.display = 'flex';
                        
                        setupChatEvents(); // Çat qəbuledicilərini yalnız indi aktivləşdiririk
                    } else {
                        showError(response.message);
                        loginBtn.disabled = false;
                        loginBtn.innerText = "Daxil Ol / Qeydiyyat";
                        socket.disconnect(); // Giriş uğursuzdursa bağlantını kəs
                    }
                });
            });
        });

        function setupChatEvents() {
            // Köhnə mesajları yüklə
            socket.on('loadAllMessages', (allMessages) => {
                messagesBox.innerHTML = ""; 
                allMessages.forEach(msg => appendMessage(msg));
                scrollBottom();
            });

            // Yeni gələn mesajları tut
            socket.on('receiveMessage', (newMsg) => {
                appendMessage(newMsg);
                scrollBottom();
            });
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !socket) return;

            socket.emit('sendMessage', { nick: myNick, message: text });
            messageInput.value = "";
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function appendMessage(data) {
            const msgDiv = document.createElement('div');
            const isMe = data.nick === myNick;
            msgDiv.classList.add('msg', isMe ? 'sent' : 'received');
            msgDiv.innerHTML = `
                <div class="meta">${isMe ? 'Sən' : data.nick}</div>
                <div class="text">${escapeHTML(data.message)}</div>
            `;
            messagesBox.appendChild(msgDiv);
        }

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function scrollBottom() {
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function showError(text) {
            errorMsg.innerText = text;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
